<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thực Hành Đo Góc - Full Screen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4; 
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .main-content {
            display: flex;
            flex: 1;
            gap: 15px;
            min-height: 0; 
        }

        .workspace-container {
            flex: 1; 
            position: relative;
            background-color: #f8fafc;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
            border: 2px solid #cbd5e1;
            cursor: grab; 
            /* Chỉ chặn cuộn trang (scroll) khi người dùng chạm vào khu vực vẽ */
            touch-action: none; 
        }

        .workspace-container:active {
            cursor: grabbing;
        }

        #canvas-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #ffffff;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 25px 25px; 
            transform-origin: 50% 50%;
            transition: transform 0.1s ease-out; 
            will-change: transform;
        }

        #angle-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        #protractor-wrapper {
            position: absolute;
            z-index: 10;
            transform-origin: 250px 250px; 
            cursor: grab;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            width: 500px;
            height: 280px;
        }

        #protractor-svg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #protractor-svg-container svg {
            display: block; 
            width: 100%;
            height: 100%;
        }

        #protractor-wrapper:hover {
            cursor: grab;
        }
        #protractor-wrapper:active {
            cursor: grabbing;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }

        .auto-move {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .rotate-handle {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #3b82f6;
            color: white;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: bold;
            cursor: ew-resize;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 2px solid white;
        }

        .rotate-handle:active {
            background-color: #2563eb;
        }

        .snap-effect {
            animation: snapPulse 0.4s ease-out;
        }

        @keyframes snapPulse {
            0% { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }
            50% { filter: drop-shadow(0 0 20px #3b82f6) brightness(1.1); }
            100% { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }
        }

        .feedback-pop {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .side-panel {
            width: 380px; 
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: auto; 
            touch-action: pan-y; /* Cho phép cuộn trên điện thoại */
        }
        
        .side-panel::-webkit-scrollbar { display: none; }
        .side-panel { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media (max-width: 1024px) {
            .main-content { flex-direction: column; }
            .side-panel { width: 100%; flex-shrink: 1; }
            .workspace-container { flex: 2; min-height: 400px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="text-center mb-3 shrink-0 flex items-center justify-center gap-4">
            <h1 class="text-2xl md:text-3xl font-extrabold text-green-700">📐 Thực Hành Đo Góc</h1>
            <p class="text-gray-600 hidden md:block">| Kéo thả bản nền để di chuyển, dùng 2 ngón tay để Zoom (Phóng to) nhé!</p>
        </header>

        <div class="main-content">
            <div class="workspace-container" id="workspace">
                
                <div class="absolute top-4 left-4 z-50 flex flex-col gap-2 bg-white/95 p-2 rounded-lg shadow-md border border-gray-200 backdrop-blur-sm pointer-events-auto cursor-default">
                    <span class="text-[10px] uppercase font-bold text-gray-500 text-center tracking-wider">Thu Phóng</span>
                    <button id="btn-zoom-in" class="w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-blue-100 rounded text-gray-700 hover:text-blue-700 font-bold text-2xl transition">+</button>
                    <span id="zoom-level-text" class="text-sm font-bold text-center text-blue-600">100%</span>
                    <button id="btn-zoom-out" class="w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-blue-100 rounded text-gray-700 hover:text-blue-700 font-bold text-2xl transition">-</button>
                    <button id="btn-zoom-reset" class="w-10 h-8 flex items-center justify-center bg-blue-100 hover:bg-blue-200 rounded text-blue-700 font-bold text-xs mt-1 transition">Reset</button>
                </div>

                <div class="absolute bottom-4 left-4 z-40 bg-white/80 px-3 py-1.5 rounded-full shadow-sm border border-gray-200 text-xs font-bold text-gray-500 pointer-events-none flex items-center gap-2">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0m-3 6a1.5 1.5 0 00-3 0v2a7.5 7.5 0 0015 0v-5a1.5 1.5 0 00-3 0m-6-3V11m0-5.5v-1a1.5 1.5 0 013 0v1m0 0V11m0-5.5a1.5 1.5 0 013 0v3m0 0V11"></path></svg>
                    Giữ lưới để kéo - Dùng 2 ngón tay để Zoom
                </div>

                <div class="absolute bottom-2 right-2 opacity-50 hover:opacity-100 transition-opacity z-50 bg-white/80 px-2 py-1 rounded shadow-sm">
                    <select id="teacher-mode" class="bg-transparent text-xs font-mono text-gray-600 font-bold border-none outline-none cursor-pointer" title="Cài đặt góc (Chỉ GV)">
                        <option value="random">v1.0.0 (Ngẫu nhiên)</option>
                        <option value="nhon">v1.0.1 (Ép Góc Nhọn)</option>
                        <option value="vuong">v1.0.2 (Ép Góc Vuông)</option>
                        <option value="tu">v1.0.3 (Ép Góc Tù)</option>
                        <option value="bet">v1.0.4 (Ép Góc Bẹt)</option>
                    </select>
                </div>

                <div id="canvas-wrapper">
                    <svg id="angle-layer"></svg>

                    <div id="protractor-wrapper" style="left: 50px; top: 50px; transform: rotate(0deg);">
                        <div id="protractor-center-point" style="position: absolute; left: 250px; top: 250px; width: 0px; height: 0px; pointer-events: none;"></div>
                        
                        <div class="rotate-handle" id="rotate-handle">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            Xoay Thước
                        </div>
                        <div id="protractor-svg-container"></div>
                    </div>
                </div>
            </div>

            <div class="side-panel bg-white p-6 rounded-xl border-2 border-gray-200 shadow-sm">
                <div>
                    <div class="flex gap-2 mb-3">
                        <button id="btn-new-chan" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-2 rounded-lg transition shadow-md text-sm flex items-center justify-center gap-1">
                            ✨ Góc Chẵn
                        </button>
                        <button id="btn-new-le" class="flex-1 bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 px-2 rounded-lg transition shadow-md text-sm flex items-center justify-center gap-1">
                            🎲 Góc Lẻ
                        </button>
                    </div>
                    
                    <button id="btn-hint" class="w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-2 px-4 rounded-lg mb-6 transition shadow-md flex items-center justify-center gap-2 text-sm border border-yellow-500">
                        💡 Tự động đặt thước giúp em
                    </button>

                    <div class="space-y-5">
                        <div>
                            <label class="block font-bold text-gray-700 mb-2">1. Góc này có số đo là bao nhiêu?</label>
                            <div class="flex items-center gap-3">
                                <input type="number" id="input-deg" min="0" max="180" class="w-full border-2 border-gray-300 rounded-lg p-3 text-lg font-bold text-center focus:border-blue-500 focus:outline-none" placeholder="VD: 60">
                                <span class="text-xl font-bold text-gray-500">độ (°)</span>
                            </div>
                        </div>

                        <div>
                            <label class="block font-bold text-gray-700 mb-2">2. Dựa vào số đo, đây là loại góc gì?</label>
                            <select id="select-type" class="w-full border-2 border-gray-300 rounded-lg p-3 text-lg font-semibold focus:border-blue-500 focus:outline-none bg-white">
                                <option value="">-- Chọn loại góc --</option>
                                <option value="nhon">Góc nhọn (< 90°)</option>
                                <option value="vuong">Góc vuông (= 90°)</option>
                                <option value="tu">Góc tù (> 90° và < 180°)</option>
                                <option value="bet">Góc bẹt (= 180°)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="mt-8">
                    <button id="btn-check" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-4 rounded-lg transition shadow-md text-xl">
                        Kiểm Tra Kết Quả
                    </button>

                    <div id="feedback" class="mt-4 p-4 rounded-lg font-bold text-center hidden">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 0. HỆ THỐNG THU PHÓNG VÀ PAN
        // ==========================================
        let currentZoom = 1;
        let panX = 0, panY = 0; 
        let isPanningCanvas = false;
        let startPanMouseX, startPanMouseY;
        
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const zoomLevelText = document.getElementById('zoom-level-text');
        const workspace = document.getElementById('workspace');

        function updateCanvasTransform() {
            canvasWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${currentZoom})`;
        }

        function setZoom(level) {
            currentZoom = Math.max(0.5, Math.min(level, 4)); 
            updateCanvasTransform();
            zoomLevelText.innerText = Math.round(currentZoom * 100) + '%';
        }

        document.getElementById('btn-zoom-in').addEventListener('click', () => setZoom(currentZoom + 0.2));
        document.getElementById('btn-zoom-out').addEventListener('click', () => setZoom(currentZoom - 0.2));
        document.getElementById('btn-zoom-reset').addEventListener('click', () => {
            panX = 0; panY = 0; 
            setZoom(1);
        });

        workspace.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) setZoom(currentZoom + 0.1);
            else setZoom(currentZoom - 0.1);
        }, { passive: false });

        // ==========================================
        // 1. TẠO THƯỚC ĐO GÓC SVG SIÊU CHUẨN XÁC
        // ==========================================
        function buildProtractor() {
            let svg = `<svg viewBox="-250 -250 500 280" preserveAspectRatio="xMidYMid meet">`;
            
            svg += `<path d="M -240 0 A 240 240 0 0 1 240 0 Z" fill="rgba(240, 249, 255, 0.85)" stroke="#0ea5e9" stroke-width="2" />`;
            svg += `<path d="M -130 0 A 130 130 0 0 1 130 0 Z" fill="rgba(255, 255, 255, 0.4)" stroke="#0ea5e9" stroke-width="1" />`;

            for (let i = 0; i <= 180; i++) {
                let theta = (180 - i) * Math.PI / 180;
                let isMajor = i % 10 === 0;
                let isMedium = i % 5 === 0 && !isMajor;

                let outerR = 240;
                let innerR = isMajor ? 215 : (isMedium ? 225 : 232);

                let x1 = outerR * Math.cos(theta);
                let y1 = -outerR * Math.sin(theta);
                let x2 = innerR * Math.cos(theta);
                let y2 = -innerR * Math.sin(theta);

                svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#334155" stroke-width="${isMajor ? 2 : 1.2}" shape-rendering="geometricPrecision" />`;

                if (isMajor) {
                    let lx1 = 200 * Math.cos(theta);
                    let ly1 = -200 * Math.sin(theta);
                    svg += `<text x="${lx1}" y="${ly1}" fill="#ef4444" font-size="15" font-weight="900" text-anchor="middle" dominant-baseline="central" transform="rotate(${i - 90}, ${lx1}, ${ly1})">${i}</text>`;

                    let lx2 = 170 * Math.cos(theta);
                    let ly2 = -170 * Math.sin(theta);
                    svg += `<text x="${lx2}" y="${ly2}" fill="#0ea5e9" font-size="15" font-weight="900" text-anchor="middle" dominant-baseline="central" transform="rotate(${i - 90}, ${lx2}, ${ly2})">${180 - i}</text>`;
                }
            }

            svg += `<line x1="-240" y1="0" x2="240" y2="0" stroke="#0ea5e9" stroke-width="2" shape-rendering="geometricPrecision" />`;
            svg += `<line x1="-15" y1="0" x2="15" y2="0" stroke="#ef4444" stroke-width="2" shape-rendering="crispEdges" />`;
            svg += `<line x1="0" y1="-15" x2="0" y2="15" stroke="#ef4444" stroke-width="2" shape-rendering="crispEdges" />`;
            svg += `<circle cx="0" cy="0" r="4" fill="none" stroke="#ef4444" stroke-width="2" />`;
            svg += `<circle cx="0" cy="0" r="1.5" fill="#1e293b" />`; 

            svg += `</svg>`;
            document.getElementById('protractor-svg-container').innerHTML = svg;
        }

        // ==========================================
        // 2. LOGIC VẼ GÓC TOÁN HỌC KHÔNG SAI SỐ
        // ==========================================
        let currentAngleDeg = 0;
        let currentVertex = { x: 0, y: 0 };
        let baseLineAngle = 0;

        function generateRandomAngle(mode = 'chan') {
            const svgLayer = document.getElementById('angle-layer');
            
            currentVertex.x = Math.floor(workspace.clientWidth / 2 + (Math.random() * 80 - 40));
            currentVertex.y = Math.floor(workspace.clientHeight / 2 + (Math.random() * 60 - 30));
            
            baseLineAngle = Math.floor(Math.random() * 360);
            const teacherMode = document.getElementById('teacher-mode').value;

            if (teacherMode === 'vuong') {
                currentAngleDeg = 90;
            } else if (teacherMode === 'bet') {
                currentAngleDeg = 180;
            } else if (teacherMode === 'nhon') {
                if (mode === 'chan') currentAngleDeg = Math.floor(Math.random() * 15 + 3) * 5; 
                else do { currentAngleDeg = Math.floor(Math.random() * 79) + 11; } while (currentAngleDeg % 5 === 0);
            } else if (teacherMode === 'tu') {
                if (mode === 'chan') currentAngleDeg = Math.floor(Math.random() * 17 + 19) * 5; 
                else do { currentAngleDeg = Math.floor(Math.random() * 89) + 91; } while (currentAngleDeg % 5 === 0);
            } else {
                if (mode === 'chan') currentAngleDeg = Math.floor(Math.random() * 33 + 3) * 5; 
                else do { currentAngleDeg = Math.floor(Math.random() * 169) + 11; } while (currentAngleDeg % 5 === 0);
            }

            const length = 1500; 
            
            let end1X = currentVertex.x + length * Math.cos(baseLineAngle * Math.PI / 180);
            let end1Y = currentVertex.y + length * Math.sin(baseLineAngle * Math.PI / 180);

            let angle2 = baseLineAngle - currentAngleDeg; 
            let end2X = currentVertex.x + length * Math.cos(angle2 * Math.PI / 180);
            let end2Y = currentVertex.y + length * Math.sin(angle2 * Math.PI / 180);

            let arcRadius = 45;
            let arcStartX = currentVertex.x + arcRadius * Math.cos(baseLineAngle * Math.PI / 180);
            let arcStartY = currentVertex.y + arcRadius * Math.sin(baseLineAngle * Math.PI / 180);
            let arcEndX = currentVertex.x + arcRadius * Math.cos(angle2 * Math.PI / 180);
            let arcEndY = currentVertex.y + arcRadius * Math.sin(angle2 * Math.PI / 180);
            let largeArcFlag = currentAngleDeg > 180 ? 1 : 0; 

            // CẬP NHẬT: Tia mỏng lại 2.5 và đổi màu Đỏ (#ef4444)
            svgLayer.innerHTML = `
                <path d="M ${arcStartX} ${arcStartY} A ${arcRadius} ${arcRadius} 0 ${largeArcFlag} 0 ${arcEndX} ${arcEndY}" fill="rgba(234, 179, 8, 0.3)" stroke="#ca8a04" stroke-width="2" shape-rendering="geometricPrecision" />
                <line x1="${currentVertex.x}" y1="${currentVertex.y}" x2="${end1X}" y2="${end1Y}" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" shape-rendering="geometricPrecision" />
                <line x1="${currentVertex.x}" y1="${currentVertex.y}" x2="${end2X}" y2="${end2Y}" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" shape-rendering="geometricPrecision" />
                <circle cx="${currentVertex.x}" cy="${currentVertex.y}" r="6" fill="#ef4444" stroke="#fff" stroke-width="2" shape-rendering="geometricPrecision" />
            `;

            document.getElementById('input-deg').value = '';
            document.getElementById('select-type').value = '';
            document.getElementById('feedback').className = 'hidden';
            
            panX = 0; panY = 0;
            setZoom(1); 
        }

        // ==========================================
        // 3. LÕI EVENT MỚI: TÍCH HỢP CHUẨN CẢ CHUỘT & CẢM ỨNG
        // ==========================================
        const protractor = document.getElementById('protractor-wrapper');
        const rotateHandle = document.getElementById('rotate-handle');
        
        let isDragging = false, isRotating = false;
        let startMouseX, startMouseY;
        let startLeft, startTop, startRot, currentRot = 0; 
        let rotCenterX, rotCenterY;

        let initialPinchDist = null;
        let initialPinchZoom = 1;

        function getAngleDiff(a, b) {
            let diff = (a - b) % 360;
            while (diff <= -180) diff += 360;
            while (diff > 180) diff -= 360;
            return Math.abs(diff);
        }

        document.getElementById('btn-hint').addEventListener('click', () => {
            protractor.classList.add('auto-move');
            protractor.style.left = (currentVertex.x - 250) + 'px';
            protractor.style.top = (currentVertex.y - 250) + 'px';
            currentRot = baseLineAngle;
            protractor.style.transform = `rotate(${currentRot}deg)`;
            setTimeout(() => { protractor.classList.remove('auto-move'); }, 600);
        });

        // CÁC HÀM XỬ LÝ CHUNG CHO CẢ MOUSE VÀ TOUCH
        function handleDragStart(x, y) {
            protractor.classList.remove('auto-move');
            isDragging = true;
            startMouseX = x;
            startMouseY = y;
            startLeft = parseFloat(protractor.style.left) || 0;
            startTop = parseFloat(protractor.style.top) || 0;
        }

        function handleRotateStart(x, y) {
            protractor.classList.remove('auto-move');
            isRotating = true;
            let centerRect = document.getElementById('protractor-center-point').getBoundingClientRect();
            rotCenterX = centerRect.left;
            rotCenterY = centerRect.top;
            startMouseX = rotCenterX;
            startMouseY = rotCenterY;
            let dx = x - rotCenterX;
            let dy = y - rotCenterY;
            startRot = Math.atan2(dy, dx) * 180 / Math.PI - currentRot;
        }

        function handlePanStart(x, y) {
            isPanningCanvas = true;
            startPanMouseX = x - panX; 
            startPanMouseY = y - panY;
        }

        function handleMove(x, y) {
            if (isDragging) {
                let dx = (x - startMouseX) / currentZoom;
                let dy = (y - startMouseY) / currentZoom;
                let newLeft = startLeft + dx;
                let newTop = startTop + dy;
                let protractorCenterX = newLeft + 250; 
                let protractorCenterY = newTop + 250;
                let dist = Math.sqrt(Math.pow(protractorCenterX - currentVertex.x, 2) + Math.pow(protractorCenterY - currentVertex.y, 2));
                if (dist < 40) { 
                    newLeft = currentVertex.x - 250;
                    newTop = currentVertex.y - 250;
                }
                protractor.style.left = newLeft + 'px';
                protractor.style.top = newTop + 'px';
            } 
            else if (isRotating) {
                let dx = x - rotCenterX;
                let dy = y - rotCenterY;
                let angle = Math.atan2(dy, dx) * 180 / Math.PI;
                let rawRot = angle - startRot;

                let angle2 = baseLineAngle - currentAngleDeg;
                let snapRot = rawRot;
                let targetAngles = [baseLineAngle, baseLineAngle + 180, angle2, angle2 + 180];
                for (let target of targetAngles) {
                    if (getAngleDiff(rawRot, target) < 5) {
                        snapRot = target;
                        break;
                    }
                }
                currentRot = snapRot;
                protractor.style.transform = `rotate(${currentRot}deg)`;
            }
            else if (isPanningCanvas) {
                panX = x - startPanMouseX;
                panY = y - startPanMouseY;
                canvasWrapper.style.transition = 'none'; 
                updateCanvasTransform();
            }
        }

        function handleEnd() {
            if(isDragging || isRotating) {
                protractor.classList.remove('snap-effect');
                void protractor.offsetWidth; 
                protractor.classList.add('snap-effect');
            }
            isDragging = false;
            isRotating = false;
            if (isPanningCanvas) {
                isPanningCanvas = false;
                canvasWrapper.style.transition = 'transform 0.1s ease-out'; 
            }
        }

        // KẾT NỐI SỰ KIỆN CHUỘT (DESKTOP)
        protractor.addEventListener('mousedown', e => {
            if(e.target === rotateHandle || rotateHandle.contains(e.target)) return;
            handleDragStart(e.clientX, e.clientY);
        });
        rotateHandle.addEventListener('mousedown', e => {
            e.stopPropagation();
            handleRotateStart(e.clientX, e.clientY);
        });
        workspace.addEventListener('mousedown', e => {
            if (e.target.closest('#protractor-wrapper') || e.target.closest('button') || e.target.closest('select') || e.target.closest('input')) return;
            handlePanStart(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);

        // KẾT NỐI SỰ KIỆN CẢM ỨNG (MOBILE/IPAD) MƯỢT MÀ
        workspace.addEventListener('touchstart', e => {
            if (e.target.closest('button') || e.target.closest('select') || e.target.closest('input')) return;
            
            // Xử lý Pinch Zoom 2 ngón tay
            if (e.touches.length === 2) {
                isPanningCanvas = false;
                initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initialPinchZoom = currentZoom;
                if(e.cancelable) e.preventDefault();
            } 
            // Pan bản vẽ 1 ngón
            else if (e.touches.length === 1 && !e.target.closest('#protractor-wrapper')) {
                handlePanStart(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, {passive: false});

        protractor.addEventListener('touchstart', e => {
            if (e.touches.length > 1) return; // Nếu chạm nhiều ngón thì bỏ qua
            if(e.cancelable) e.preventDefault(); // Tránh bị cuộn màn hình khi đang giữ thước
            
            let touch = e.touches[0];
            if(e.target === rotateHandle || rotateHandle.contains(e.target)) {
                handleRotateStart(touch.clientX, touch.clientY);
            } else {
                handleDragStart(touch.clientX, touch.clientY);
            }
        }, {passive: false});

        window.addEventListener('touchmove', e => {
            // Cập nhật Pinch Zoom
            if (e.touches.length === 2) {
                if(e.cancelable) e.preventDefault();
                if (initialPinchDist) {
                    let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    setZoom(initialPinchZoom * (dist / initialPinchDist));
                }
                return;
            }
            
            // Xử lý kéo/xoay/pan chung
            if (isDragging || isRotating || isPanningCanvas) {
                if(e.cancelable) e.preventDefault();
                handleMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, {passive: false});

        window.addEventListener('touchend', e => {
            initialPinchDist = null;
            if (e.touches.length === 0) handleEnd();
        });


        // ==========================================
        // 4. KIỂM TRA ĐÁP ÁN 
        // ==========================================
        document.getElementById('btn-new-chan').addEventListener('click', () => generateRandomAngle('chan'));
        document.getElementById('btn-new-le').addEventListener('click', () => generateRandomAngle('le'));

        document.getElementById('btn-check').addEventListener('click', () => {
            const userDegInput = document.getElementById('input-deg').value;
            const userType = document.getElementById('select-type').value;
            
            if (userDegInput === '' || userType === '') {
                showFeedback("Vui lòng điền đủ số đo và chọn loại góc nhé!", "warning");
                return;
            }

            const userDeg = parseInt(userDegInput);
            
            let trueType = '';
            if (currentAngleDeg < 90) trueType = 'nhon';
            else if (currentAngleDeg === 90) trueType = 'vuong';
            else if (currentAngleDeg < 180) trueType = 'tu';
            else if (currentAngleDeg === 180) trueType = 'bet';

            const diff = Math.abs(userDeg - currentAngleDeg);
            const wrongScaleDiff = Math.abs(userDeg - (180 - currentAngleDeg));

            if (diff === 0 && userType === trueType) {
                showFeedback(`🎉 Tuyệt vời! Kết quả chính xác 100%. Đây là một ${getTypeName(trueType)} có số đo ${currentAngleDeg}°.`, "correct");
            }
            else if (diff === 1 && userType === trueType) {
                showFeedback(`🎉 Rất tốt! Em đo được ${userDeg}°, sai số chỉ 1° so với số đo chuẩn toán học là ${currentAngleDeg}°. Cố gắng căn thước chuẩn xác hơn chút nữa nhé!`, "correct");
            } 
            else if (diff <= 1 && userType !== trueType) {
                showFeedback(`Gần chuẩn! Số đo ${userDeg}° là đúng, nhưng phân loại góc chưa chính xác.`, "warning");
            }
            else if (wrongScaleDiff <= 1) {
                showFeedback(`Lưu ý! Góc thực tế là ${currentAngleDeg}°. Bạn đang đọc nhầm vòng cung số trên thước. Nhớ nhìn vòng cung bắt đầu từ vạch 0 nằm trên cạnh góc.`, "incorrect");
            }
            else {
                showFeedback(`Chưa chính xác. Số đo đúng là ${currentAngleDeg}°. Em bấm nút "Tự động đặt thước giúp em" để xem cách đặt thước chuẩn nhé!`, "incorrect");
            }
        });

        function getTypeName(typeVal) {
            const map = { 'nhon': 'Góc nhọn', 'vuong': 'Góc vuông', 'tu': 'Góc tù', 'bet': 'Góc bẹt' };
            return map[typeVal];
        }

        function showFeedback(msg, type) {
            const fbBox = document.getElementById('feedback');
            fbBox.className = 'feedback-pop mt-4 p-4 rounded-lg font-bold text-center border-2';
            fbBox.innerHTML = msg;
            
            if (type === 'correct') {
                fbBox.classList.add('bg-green-100', 'text-green-800', 'border-green-300');
            } else if (type === 'incorrect') {
                fbBox.classList.add('bg-red-100', 'text-red-800', 'border-red-300');
            } else {
                fbBox.classList.add('bg-yellow-100', 'text-yellow-800', 'border-yellow-300');
            }
        }

        buildProtractor();
        generateRandomAngle('chan');
    </script>
</body>
